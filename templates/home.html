<!DOCTYPE html>
<html>
<head>
  <title>Smart Support Portal</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="theme-auth home-page">

<!-- HEADER -->
<div class="home-header">
  <h1>SMART SUPPORT PORTAL</h1>
  <a href="/login" class="login-btn">Log In</a>
</div>

<!-- SEARCH SECTION -->
<div class="home-search-container">

  <!-- FAQ SEARCH -->
<div class="search-card">
  <h3>FAQ Search Box</h3>

  <input
    type="text"
    placeholder="Search FAQs..."
    onkeyup="searchFAQ(this.value)"
  >

  <!-- Dynamic FAQ List -->
  <div id="faqList" class="faq-list"></div>
</div>
<div class="search-card">
  <h3>Ask Assistant</h3>

  <input type="text" id="query" placeholder="Ask your problem..." style="width: 100%;">
  
<button class="kb-btn" onclick="searchKB()">Search</button>
  <div id="kbResult" class="result-box">
    <p class="placeholder">Ask a question to get help from AI...</p>
  </div>
</div>

<script>
async function searchKB() {
    const query = document.getElementById("query").value;
    console.log("Sending query:", query);  
    const res = await fetch(`/kb/ask?query=${encodeURIComponent(query)}`);
    const data = await res.json();

    console.log("Response:", data);  

    document.getElementById("answer").innerText = data.answer;
    const resultBox = document.getElementById("kbResult");

    if (!query.trim()) {
        resultBox.innerHTML = "<p>Please enter a question</p>";
        return;
    }

    // loading.....
    resultBox.innerHTML = "<p>Searching...</p>";

    try {
        const res = await fetch(`/kb/ask?query=${encodeURIComponent(query)}`);
        const data = await res.json();

        if (data.answer && data.answer !== "Please contact agent.") {
            resultBox.innerHTML = `<p class="answer">${data.answer}</p>`;
        } else {
            resultBox.innerHTML = `
                <p>No solution found</p>
                <a href="/login" class="contact-btn">Contact Agent</a>
            `;
        }

    } catch (error) {
        resultBox.innerHTML = "<p style='color:red;'>Error occurred</p>";
    }
}
</script>
<script>
document.getElementById("query").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        searchKB();
    }
});
</script>

</div>

<script>
function goLogin() {
  window.location.href = "/";
}
</script>
<script>
async function searchFAQ(text) {
  const res = await fetch(`/faq?search=${text}`);
  const data = await res.json();

  const container = document.getElementById("faqList");
  container.innerHTML = "";

  data.forEach(item => {
    container.innerHTML += `
      <div class="faq-item" onclick="toggleFAQ(this)">
        <div class="faq-question">
          <span>${item.question}</span>
          
        </div>
        <div class="faq-answer">${item.answer}</div>
      </div>
    `;
  });
}
</script>



<script>
let allFaqs = [];

async function loadFAQs() {
  const res = await fetch("/faqs/");
  allFaqs = await res.json();
  renderFAQs(allFaqs);
}

function renderFAQs(faqs) {
  const faqList = document.getElementById("faqList");
  faqList.innerHTML = "";

  faqs.slice(0, 5).forEach((faq, index) => {
    faqList.innerHTML += `
      <div class="faq-item" onclick="toggleAnswer(${index})">
        <span>${faq.question}</span>
       
      </div>
      <div class="faq-answer" id="answer-${index}">
        ${faq.answer}
      </div>
    `;
  });
}

function toggleAnswer(index) {
  const ans = document.getElementById(`answer-${index}`);
  ans.style.display = ans.style.display === "block" ? "none" : "block";
}
function searchFAQ(keyword) {
  const filtered = allFaqs.filter(faq =>
    faq.question.toLowerCase().includes(keyword.toLowerCase())
  );
  renderFAQs(filtered);
}
loadFAQs();
</script>
<script>

async function searchKB() {
    const query = document.getElementById("query").value;
    const resultBox = document.getElementById("kbResult");

    console.log("Sending query:", query);

    if (!query.trim()) {
        resultBox.innerHTML = "<p>Please enter a question</p>";
        return;
    }
    resultBox.innerHTML = "<p>Searching...</p>";

    try {
        const res = await fetch(`/kb/ask?query=${encodeURIComponent(query)}`);
        const data = await res.json();

        console.log("Response:", data);

        if (data.answer && data.answer !== "Please contact agent.") {
            resultBox.innerHTML = `<p class="answer">${data.answer}</p>`;
        } else {
            resultBox.innerHTML = `
                <p>No solution found</p>
                <a href="/login" class="contact-btn">Contact Agent</a>
            `;
        }

    } catch (error) {
        resultBox.innerHTML = "<p style='color:red;'>Error occurred</p>";
    }
}


function goToLogin() {
  window.location.href = "/login";
}
</script>

</body>
</html>
