<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="/static/login_register.css">
</head>
<body class="theme-auth">

<div class="auth-container">
  <div class="auth-card">
    <h2>Register</h2>

<form id="registerForm">
  <input type="text" id="username" placeholder="Username" required />
  <input type="email" id="email" placeholder="Email" required />
  <input type="password" id="password" placeholder="Password (min 6 chars)" required />
  <button type="submit">Register</button>
</form>

<p id="errorMsg" style="color:red; text-align:center;"></p>

    <div class="auth-link">
      <a href="/login">Back to Login</a>
    </div>
  </div>
</div>


<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData();
    formData.append("username", document.getElementById("username").value);
    formData.append("email", document.getElementById("email").value);
    formData.append("password", document.getElementById("password").value);

    const res = await fetch("/register/customer", {
        method: "POST",
        body: formData
    });


    if (!res.ok) {
        const error = await res.json();
        document.getElementById("errorMsg").innerText = error.detail;
        return; 
    }

    const data = await res.json();

    localStorage.setItem("user_id", data.user_id);
    localStorage.setItem("username", data.username);

    window.location.href = "/customer";
});
</script>

<script>
async function register() {
    const role = document.getElementById("role").value;
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const data = {
        name: name,
        email: email,
        password: password
    };

    try {
        const response = await fetch(`/register/${role}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const text = await response.text(); 

        try {
            const result = JSON.parse(text); 
            alert(result.message || JSON.stringify(result));
        } catch (e) {
            alert("Server Error:\n" + text);  
        }

    } catch (error) {
        alert("Fetch Error: " + error);
    }
}
</script>


</body>
</html>
